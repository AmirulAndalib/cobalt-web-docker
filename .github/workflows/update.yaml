name: update

on:
  schedule:
    - cron: "5 4 * * *" # every day at 04:05 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "forces an update even if no new version is found"
        type: choice
        default: "false"
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.update.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - run: ./check.sh
        id: update
        env:
          registry: ghcr.io/spotdemo4/cobalt-web
          token: ${{ github.token }}
          force: ${{ inputs.force }}

  build:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.version != ''
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ghcr.io/spotdemo4/cobalt-web:${{ needs.check.outputs.version }}
            ghcr.io/spotdemo4/cobalt-web:latest
