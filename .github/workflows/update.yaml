name: update

on:
  schedule:
    - cron: "5 4 * * *" # every day at 04:05 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "forces an update even if no new version is found"
        type: choice
        default: "false"
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.update.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: ./check.sh
        id: update
        env:
          registry: ghcr.io/spotdemo4/cobalt-web
          token: ${{ github.token }}
          force: ${{ inputs.force }}

  build:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.version != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ghcr.io/spotdemo4/cobalt-web:${{ needs.check.outputs.version }}
            ghcr.io/spotdemo4/cobalt-web:latest
