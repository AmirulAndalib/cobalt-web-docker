name: update

on:
  schedule:
    - cron: "5 4 * * *" # every day at 04:05 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "forces an update even if no new version is found"
        type: choice
        default: "false"
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.update.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: ./check.sh
        id: update
        env:
          registry: ghcr.io/spotdemo4/cobalt-web
          token: ${{ github.token }}
          force: ${{ inputs.force }}

  build:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.version != ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ghcr.io/spotdemo4/cobalt-web:${{ needs.check.outputs.version }}
            ghcr.io/spotdemo4/cobalt-web:latest
